# ── 1. Privileged pod with dangerous caps and hostPID ─────────────────────────
apiVersion: v1
kind: Pod
metadata:
  name: privileged-pod
  namespace: vuln-workloads
spec:
  hostPID: true
  hostNetwork: true
  containers:
  - name: root-shell
    image: ubuntu:latest
    command: ["sleep", "infinity"]
    securityContext:
      privileged: true
      runAsUser: 0
      allowPrivilegeEscalation: true
      capabilities:
        add: ["SYS_ADMIN", "NET_ADMIN", "SYS_PTRACE"]
    # no resource limits
    # no readOnly rootfs
    # no liveness/readiness probes
---
# ── 2. Plaintext secrets in env vars ─────────────────────────────────────────
apiVersion: v1
kind: Pod
metadata:
  name: secret-in-env
  namespace: vuln-workloads
spec:
  containers:
  - name: app
    image: nginx:latest
    env:
    - name: DB_PASSWORD
      value: "SuperSecret123!"
    - name: API_KEY
      value: "sk-abc123verysecretkey"
    - name: AWS_SECRET_ACCESS_KEY
      value: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
    - name: AUTH_TOKEN
      value: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9"
    resources: {}
---
# ── 3. hostPath volume mounts to sensitive host directories ───────────────────
apiVersion: v1
kind: Pod
metadata:
  name: host-path-miner
  namespace: vuln-workloads
spec:
  containers:
  - name: reader
    image: busybox:1.36
    command: ["sleep", "infinity"]
    volumeMounts:
    - name: host-etc
      mountPath: /host-etc
    - name: host-var
      mountPath: /host-var
    securityContext:
      runAsUser: 0
  volumes:
  - name: host-etc
    hostPath:
      path: /etc
  - name: host-var
    hostPath:
      path: /var/log
---
# ── 4. No security context at all, latest image, no limits ───────────────────
apiVersion: v1
kind: Pod
metadata:
  name: bare-pod
  namespace: dev-team
spec:
  containers:
  - name: web
    image: python:latest
    command: ["python", "-m", "http.server", "8080"]
    ports:
    - containerPort: 8080
      hostPort: 8080   # host port mapping
---
# ── 5. Service account token auto-mounted, caps not dropped ──────────────────
apiVersion: v1
kind: Pod
metadata:
  name: over-permissioned-pod
  namespace: dev-team
spec:
  serviceAccountName: default
  # automountServiceAccountToken not set to false
  containers:
  - name: app
    image: curlimages/curl:7.87.0
    command: ["sleep", "infinity"]
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 1000
      # capabilities.drop: ALL missing
    resources:
      limits:
        cpu: "200m"
        memory: "64Mi"
---
# ── 6. Multiple containers, mixed misconfigs ──────────────────────────────────
apiVersion: v1
kind: Pod
metadata:
  name: multi-container-misconfig
  namespace: insecure-apps
spec:
  hostIPC: true
  containers:
  - name: frontend
    image: nginx
    # no tag, writable fs, no seccomp
    ports:
    - containerPort: 80
      hostPort: 9090
    resources:
      requests:
        cpu: "100m"
      # limits missing
  - name: sidecar
    image: alpine:latest
    command: ["sleep", "infinity"]
    securityContext:
      privileged: true
      capabilities:
        add: ["SYS_MODULE", "NET_RAW"]
---
# ── 7. init container with dangerous caps ─────────────────────────────────────
apiVersion: v1
kind: Pod
metadata:
  name: dangerous-init
  namespace: insecure-apps
spec:
  initContainers:
  - name: setup
    image: busybox
    command: ["sh", "-c", "chmod 777 /data"]
    securityContext:
      runAsUser: 0
      privileged: true
      capabilities:
        add: ["SYS_CHROOT", "AUDIT_WRITE"]
  containers:
  - name: app
    image: nginx:1.25.3
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 101
      capabilities:
        drop: ["ALL"]
      seccompProfile:
        type: RuntimeDefault
    resources:
      limits:
        cpu: "500m"
        memory: "128Mi"
